services:
  postgres:
    image: postgres:16-alpine
    container_name: frontstage-postgres
    environment:
      POSTGRES_USER: frontstage
      POSTGRES_PASSWORD: frontstage_dev
      POSTGRES_DB: frontstage
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontstage"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local email capture for development (invitations, notifications).
  mailpit:
    image: axllent/mailpit:latest
    container_name: frontstage-mailpit
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

volumes:
  postgres-data:
