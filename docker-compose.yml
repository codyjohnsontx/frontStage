services:
  postgres:
    image: postgres:16-alpine
    container_name: frontstage-postgres
    environment:
      POSTGRES_USER: frontstage
      POSTGRES_PASSWORD: frontstage_dev
      POSTGRES_DB: frontstage
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontstage"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage for development (attachments).
  minio:
    # Pinned release (not :latest) so dev environments are reproducible.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: frontstage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: frontstage
      MINIO_ROOT_PASSWORD: frontstage_dev_storage
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local email capture for development (invitations, notifications).
  mailpit:
    image: axllent/mailpit:latest
    container_name: frontstage-mailpit
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

volumes:
  postgres-data:
  minio-data:
